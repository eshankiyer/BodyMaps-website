name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    defaults:
      run:
        working-directory: PanTS-Demo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: PanTS-Demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      # Advisory only: the repo has pre-existing lint errors unrelated to any one
      # PR. Surfaced here as annotations; flip continue-on-error off once clean.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit + smoke tests
        run: npm test

      - name: Build
        run: npm run build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: PanTS-Demo/package-lock.json

      # Advisory: flags known CVEs in dependencies without blocking the merge.
      - name: npm audit (frontend)
        working-directory: PanTS-Demo
        run: npm audit --audit-level=high
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (backend)
        working-directory: flask-server
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true
